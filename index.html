<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Modern To-Do App</title>
</head>
<body>
    <main class="container">
        <div class="todo-app">
            <header>
                <h2>To-do App <img src="images/icon.png" alt="To-Do Icon" class="header-icon"></h2>
            </header>
            <div class="input-row">
                <input type="text" id="input-box" placeholder="What needs to be done?" autocomplete="off">
                <button id="add-btn">Add Task</button>
            </div>
            <ul id="task-container">
                <!-- Tasks will be appended here dynamically -->
            </ul>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
